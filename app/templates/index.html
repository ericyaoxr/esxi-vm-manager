<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESXi 虚拟机管理器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="4" width="32" height="24" rx="3" stroke="white" stroke-width="2" fill="none"/>
                    <rect x="6" y="8" width="8" height="6" rx="1" fill="white" opacity="0.8"/>
                    <rect x="16" y="8" width="8" height="6" rx="1" fill="white" opacity="0.6"/>
                    <rect x="6" y="16" width="18" height="2" rx="1" fill="white" opacity="0.4"/>
                    <circle cx="28" cy="26" r="3" fill="#10b981"/>
                    <circle cx="28" cy="26" r="1.5" fill="white"/>
                </svg>
                <div class="logo-text">
                    <span class="logo-title">ESXi 虚拟机管理器</span>
                    <span class="logo-subtitle">VMware 虚拟机管理控制台</span>
                </div>
            </div>
            <div class="connection-status">
                <span id="connection-indicator" class="status-dot"></span>
                <span id="connection-text">检测中...</span>
            </div>
        </header>

        <nav>
            <button class="nav-btn active" data-tab="dashboard">控制台</button>
            <button class="nav-btn" data-tab="servers">服务器</button>
            <button class="nav-btn" data-tab="vms">虚拟机</button>
            <button class="nav-btn" data-tab="scheduler">⏰ 定时任务</button>
            <button class="nav-btn" data-tab="credentials">连接配置</button>
            <button class="nav-btn" data-tab="logs">日志</button>
        </nav>

        <main>
            <section id="dashboard" class="tab-content active">
                <div class="dashboard-grid">
                    <div class="card favorites-section">
                        <h2>⭐ 快捷收藏</h2>
                        <div id="favorites-quick">
                            <p class="text-muted">暂无收藏</p>
                        </div>
                        <div class="selected-vms-preview" id="selected-vms-preview" style="display:none;">
                            <h2>📋 当前选择 <span id="selected-count-badge">0</span>台</h2>
                            <div id="selected-vms-list"></div>
                        </div>
                    </div>

                    <div class="card batch-section">
                        <h2>⚡ 批量操作</h2>
                        <div class="delay-control">
                            <label>间隔时间: <span id="delay-value">30</span>秒</label>
                            <input type="range" id="delay-slider" min="0" max="60" value="30" step="5">
                        </div>
                        <div id="batch-progress" class="batch-progress" style="display: none;">
                            <div class="progress-bar-container">
                                <div id="batch-progress-fill" class="progress-fill" style="width: 0%"></div>
                            </div>
                            <div id="batch-progress-text" class="batch-progress-text">正在处理... 剩余 <span id="countdown-seconds">0</span> 秒</div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-warning" id="suspend-btn" onclick="suspendSelectedVMs()">⏸ 挂起选中</button>
                            <button class="btn btn-success" id="start-btn" onclick="startSelectedVMs()">▶ 启动选中</button>
                            <button class="btn btn-secondary" id="refresh-batch-btn" onclick="refreshStatus()">🔄 刷新</button>
                        </div>
                    </div>

                    <div class="card vms-section">
                        <h2>
                            🖥️ 虚拟机概览
                            <div class="vm-header-actions">
                                <button class="btn btn-sm btn-primary" onclick="openSaveFavoriteModal()">💾 保存选择</button>
                                <button class="btn btn-sm btn-info" onclick="selectAllVMs()">☑️ 全选</button>
                                <button class="btn btn-sm btn-secondary" onclick="deselectAllVMs()">☐ 取消</button>
                            </div>
                        </h2>
                        <div class="vm-search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="vm-search" placeholder="搜索虚拟机..." oninput="filterVMs()">
                            <button class="btn btn-sm btn-secondary" onclick="resetSearch()">✕</button>
                        </div>
                        <div id="vm-overview">
                            <p class="text-muted">点击刷新按钮加载虚拟机列表</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="servers" class="tab-content">
                <div class="card">
                    <h2>🖧 服务器状态</h2>
                    <div id="server-list">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </section>

            <section id="vms" class="tab-content">
                <div class="card">
                    <h2 id="vms-tab-title">🖥️ 虚拟机列表</h2>
                    <div class="vm-toolbar">
                        <div class="action-buttons">
                            <button class="btn btn-warning btn-sm" onclick="suspendSelectedVMs()">⏸ 挂起选中</button>
                            <button class="btn btn-success btn-sm" onclick="startSelectedVMs()">▶ 启动选中</button>
                        </div>
                    </div>
                    <div id="vm-list">
                        <p class="text-muted">加载中...</p>
                    </div>
                </div>
            </section>

            <section id="credentials" class="tab-content">
                <div class="card">
                    <h2>🔐 连接配置</h2>
                    <p class="text-muted">可配置多台ESXi服务器，同时管理</p>
                    <div id="credentials-list">
                        <p class="text-muted">暂无配置</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAddCredentialModal()">➕ 添加服务器</button>
                </div>
            </section>

            <section id="logs" class="tab-content">
                <div class="card">
                    <h2>📋 系统日志</h2>
                    <div class="log-controls">
                        <button class="btn btn-secondary" onclick="refreshLogs()">🔄 刷新</button>
                        <button class="btn btn-secondary" id="log-auto-btn" onclick="toggleLogAutoRefresh(this)">▶ 自动刷新</button>
                        <button class="btn btn-secondary" onclick="clearLogs()">🗑️ 清空</button>
                    </div>
                    <pre id="log-content" class="log-content">加载中...</pre>
                </div>
            </section>

            <section id="scheduler" class="tab-content">
                <div class="card">
                    <h2>⏰ 定时任务管理</h2>
                </div>

                <div class="card">
                    <h3>➕ 新建任务</h3>
                    <div class="task-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>任务名称</label>
                                <input type="text" id="new-task-name" placeholder="例如: 工作日早上启动">
                            </div>
                            <div class="form-group">
                                <label>执行动作</label>
                                <select id="new-task-action">
                                    <option value="start">▶ 启动</option>
                                    <option value="stop">⏹ 停止</option>
                                    <option value="suspend">⏸ 挂起</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>执行时间</label>
                                <input type="time" id="new-task-time" value="09:00">
                            </div>
                            <div class="form-group">
                                <label>执行日期</label>
                                <div class="day-selector-inline">
                                    <label><input type="checkbox" name="new-task-days" value="0" checked> 一</label>
                                    <label><input type="checkbox" name="new-task-days" value="1" checked> 二</label>
                                    <label><input type="checkbox" name="new-task-days" value="2" checked> 三</label>
                                    <label><input type="checkbox" name="new-task-days" value="3" checked> 四</label>
                                    <label><input type="checkbox" name="new-task-days" value="4" checked> 五</label>
                                    <label><input type="checkbox" name="new-task-days" value="5"> 六</label>
                                    <label><input type="checkbox" name="new-task-days" value="6"> 日</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>选择虚拟机</label>
                            <div id="new-task-vms" class="task-vm-selector"></div>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" id="new-task-notify"> 启用微信通知</label>
                        </div>
                        <div id="new-task-wechat-config" class="form-group" style="display:none;">
                            <label>企业微信 Webhook URL</label>
                            <input type="text" id="new-task-wechat-url" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx">
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-primary" id="new-task-submit-btn" onclick="createTask()">创建任务</button>
                            <button class="btn btn-secondary" id="new-task-cancel-btn" onclick="cancelEditTask()" style="display:none;">取消</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3>📋 任务列表</h3>
                    <div id="tasks-list">
                        <p class="text-muted">暂无定时任务</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="save-favorite-modal" class="modal">
        <div class="modal-content">
            <h3>💾 保存收藏</h3>
            <div class="form-group">
                <label for="favorite-name">收藏名称:</label>
                <input type="text" id="favorite-name" placeholder="例如: 开发环境">
            </div>
            <div class="selected-vms-preview">
                <p>已选择 <span id="selected-count">0</span> 台虚拟机:</p>
                <div id="selected-vms-names" class="selected-vms-names"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="confirmSaveFavorite()">保存</button>
                <button class="btn btn-secondary" onclick="closeSaveFavoriteModal()">取消</button>
            </div>
        </div>
    </div>

    <div id="add-credential-modal" class="modal">
        <div class="modal-content">
            <h3>🖥️ 添加服务器</h3>
            <div class="form-group">
                <label for="server-name">服务器名称:</label>
                <input type="text" id="server-name" placeholder="例如: ESXi-主服务器">
            </div>
            <div class="form-group">
                <label for="server-host">ESXi 主机地址:</label>
                <input type="text" id="server-host" placeholder="192.168.1.100">
            </div>
            <div class="form-group">
                <label for="server-username">用户名:</label>
                <input type="text" id="server-username" placeholder="root">
            </div>
            <div class="form-group">
                <label for="server-password">密码:</label>
                <input type="password" id="server-password">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="confirmAddCredential()">添加</button>
                <button class="btn btn-secondary" onclick="closeAddCredentialModal()">取消</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
